<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer sleek circle -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#grad)" stroke-width="16" opacity="0.15" />
  <!-- Stylized geometric Workflow 'W' and connected nodes -->
  <g filter="url(#glow)">
    <!-- Path for W-like connection flow -->
    <path d="M120 180 L200 340 L256 230 L312 340 L392 180" fill="none" stroke="url(#grad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Pulse/node circles at key joints -->
    <circle cx="120" cy="180" r="28" fill="#ffffff" stroke="url(#grad)" stroke-width="10" />
    <circle cx="256" cy="230" r="24" fill="#8b5cf6" stroke="#ffffff" stroke-width="6" />
    <circle cx="392" cy="180" r="28" fill="#ffffff" stroke="url(#grad)" stroke-width="10" />
    <circle cx="200" cy="340" r="20" fill="#ffffff" />
    <circle cx="312" cy="340" r="20" fill="#ffffff" />
  </g>
</svg>
